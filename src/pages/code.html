<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Register | DEVFED</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header/Navbar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 lg:px-40 bg-white dark:bg-background-dark/50 backdrop-blur-sm sticky top-0 z-50">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined text-2xl">terminal</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">DEVFED</h2>
</div>
<div class="flex items-center gap-4">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Documentation</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Support</a>
</div>
</header>
<!-- Main Content: Registration Card -->
<main class="flex-1 flex items-center justify-center p-6 lg:p-12">
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 p-8 lg:p-10">
<div class="mb-8">
<h1 class="text-3xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">Create account</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 font-normal">Join the developer community and start building.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">shield</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- TOS Checkbox -->
<div class="flex items-start gap-3 mt-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-slate-800 focus:ring-2 dark:bg-slate-700 dark:border-slate-600" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                                I accept the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Primary Action Button -->
<button class="w-full mt-4 bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Create account</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Login Redirect -->
<div class="mt-6 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                                Already have an account? 
                                <a class="text-primary font-bold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-3 text-slate-500 dark:text-slate-400">Or join with</span>
</div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="GitHub logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBObJgL0NO4FAc0fKdERTZy2LR6ZGWIrZHXQ2O-_3OS86zcpd3qvDqbEuafdWGPcH3hXNQVpqp1e5KGpEx1o4epRdw0BVSJDJOT7kE7OQrmwkHQNKY7DS6S-g_ffNtvgf5UUmKoIWwADu2CVa3LgO5WQF8Hsi7_CbA1e2RagJp5i0CV1bdm03fqDyxlaZtSmC1Uelq091tD7sIiesQSozVOnBAXJbDYkp2deCS4FT2P8pQHX_P7N3WfByRXvdmYlfgHLaof6xPUE5E"/>
<span class="text-sm font-semibold">GitHub</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDADw5xhrgn3m4HErykb26OkLvmVZR7-YLTQLY6SIjVVW2-HSZ89bEN_bIaljAbT48uXJ_wwsHagZnkyB-n1RNzQfiwuVvTHSSP6NKw4-LZIWEenSGxQIQY70Tfz3zkQ_hnV3gZa99S0zzmo1_-8MeNdtmbIZkUxlmL-jG_luL2mRjTUd5fbloXbcyWmxBZSese8hhpNPzCnoPSoURxOKDajK5yyKowhL4eamSeqqLyRskc22fsBpwmgdE5DPZwmdxLRFr1D8coal8"/>
<span class="text-sm font-semibold">Google</span>
</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="px-6 lg:px-40 py-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    © 2024 DEVFED Inc. All rights reserved. Built for developers, by developers.
                </p>
</footer>
</div>
</div>
</body></html>
